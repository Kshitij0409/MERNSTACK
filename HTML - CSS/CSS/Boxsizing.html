<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #container {
        width: 200px;
        height: 200px;
        background-color: aqua;
        padding: 20px;
        border: 2px solid;
        box-sizing: border-box;
        position: relative;
      }
      p {
        width: 50px;
        height: 50px;
        background-color: red;
        position: absolute;
        right: 0px;
        bottom: 10px;
      }
    </style>
  </head>
  <body>
    <section id="container">
      <p>Hello</p>
    </section>
  </body>
</html>
