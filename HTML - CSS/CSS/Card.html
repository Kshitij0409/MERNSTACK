<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .card {
        height: 500px;
        width: 400px;
        background-color: beige;
        border-radius: 30px;
        box-sizing: border-box;
        box-shadow: 3px 3px 20px rgb(155, 142, 142);
      }
      .card h2 {
        color: rgb(202, 146, 77);
        text-transform: uppercase;
      }
      .card .price {
        padding: 10px;
        background-color: black;
        color: beige;
        width: 30%;
        border-radius: 30px;
        text-align: center;
      }
      .image-container {
        position: relative;
        background-size: cover;
      }

      .like-box {
        position: absolute;
        top: 20px;
        left: 20px;
        background-color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <article id="container">
      <section class="card">
        <div class="image-container">
          <img
            src="https://media.istockphoto.com/id/2035048820/photo/online-beauty-influencer-presenting-products.jpg?s=2048x2048&w=is&k=20&c=WpD0gSwGiDoHYacYrfSWpF6w_o7U8tlfERezaSifP04="
            alt=""
            style="
              background-size: contain;
              width: 100%;
              border-radius: 30px 30px 0px 0px;
              mix-blend-mode: multiply;
            "
          />
          <div class="like-box">❤️</div>
        </div>
        <div style="margin: 10px">
          <h2>product name</h2>
          <div class="price">$41.00 USD</div>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Repellat
            nemo dolore reiciendis officiis, ut voluptatum blanditiis porro
            numquam, veniam quisquam neque aut at molestiae, assumenda expedita.
          </p>
        </div>
      </section>
    </article>
  </body>
</html>
